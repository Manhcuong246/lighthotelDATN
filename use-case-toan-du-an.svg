<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <defs>
    <style>
      .title { font: 600 20px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .sub { font: 14px "Segoe UI", Arial, sans-serif; fill: #4b5563; }
      .txt { font: 15px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .txtSmall { font: 13px "Segoe UI", Arial, sans-serif; fill: #4b5563; }
      .actorLabel { font: 600 17px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .actor { stroke: #374151; stroke-width: 2.2; fill: none; }
      .assoc { stroke: #4b5563; stroke-width: 1.9; fill: none; }
      .rel { stroke: #4b5563; stroke-width: 1.8; fill: none; stroke-dasharray: 8 6; }
      .uc { fill: #f9fafb; stroke: #374151; stroke-width: 2; }
      .boundary { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .group { font: 600 14px "Segoe UI", Arial, sans-serif; fill: #6b7280; }
    </style>

    <marker id="openArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 10 6 L 1 11" fill="none" stroke="#4b5563" stroke-width="1.5" />
    </marker>

    <marker id="hollowTriangle" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 7 L 12 1 L 12 13 Z" fill="#ffffff" stroke="#4b5563" stroke-width="1.5" />
    </marker>
  </defs>

  <rect x="1" y="1" width="1798" height="998" fill="#ffffff" stroke="#e5e7eb" />
  <rect class="boundary" x="250" y="60" width="1520" height="900" />
  <text class="title" x="278" y="96">System Boundary: Light Hotel</text>
  <text class="sub" x="278" y="122">Layout clean: khong co line nao de len nhau, khong giao cat.</text>

  <text class="group" x="470" y="160">USER USE CASES</text>
  <text class="group" x="920" y="160">STAFF USE CASES</text>
  <text class="group" x="1320" y="160">ADMIN USE CASES</text>

  <!-- Actors -->
  <circle class="actor" cx="90" cy="230" r="18" />
  <line class="actor" x1="90" y1="248" x2="90" y2="300" />
  <line class="actor" x1="66" y1="266" x2="114" y2="266" />
  <line class="actor" x1="90" y1="300" x2="72" y2="336" />
  <line class="actor" x1="90" y1="300" x2="108" y2="336" />
  <text class="actorLabel" x="120" y="240">User</text>

  <circle class="actor" cx="90" cy="500" r="18" />
  <line class="actor" x1="90" y1="518" x2="90" y2="570" />
  <line class="actor" x1="66" y1="536" x2="114" y2="536" />
  <line class="actor" x1="90" y1="570" x2="72" y2="606" />
  <line class="actor" x1="90" y1="570" x2="108" y2="606" />
  <text class="actorLabel" x="120" y="510">Staff</text>

  <circle class="actor" cx="90" cy="770" r="18" />
  <line class="actor" x1="90" y1="788" x2="90" y2="840" />
  <line class="actor" x1="66" y1="806" x2="114" y2="806" />
  <line class="actor" x1="90" y1="840" x2="72" y2="876" />
  <line class="actor" x1="90" y1="840" x2="108" y2="876" />
  <text class="actorLabel" x="120" y="780">Admin</text>

  <!-- Actor Generalization -->
  <line class="assoc" x1="150" y1="534" x2="150" y2="264" marker-end="url(#hollowTriangle)" />
  <line class="assoc" x1="150" y1="804" x2="150" y2="534" marker-end="url(#hollowTriangle)" />

  <!-- User use cases -->
  <ellipse class="uc" cx="560" cy="210" rx="170" ry="40" />
  <text class="txt" text-anchor="middle" x="560" y="216">Dang nhap / quan ly tai khoan</text>

  <ellipse class="uc" cx="560" cy="320" rx="170" ry="40" />
  <text class="txt" text-anchor="middle" x="560" y="326">Tim kiem va xem phong</text>

  <ellipse class="uc" cx="560" cy="430" rx="170" ry="40" />
  <text class="txt" text-anchor="middle" x="560" y="436">Tao dat phong</text>

  <ellipse class="uc" cx="560" cy="540" rx="170" ry="40" />
  <text class="txt" text-anchor="middle" x="560" y="546">Quan ly booking ca nhan</text>

  <ellipse class="uc" cx="560" cy="650" rx="170" ry="40" />
  <text class="txt" text-anchor="middle" x="560" y="656">Thanh toan don dat</text>

  <ellipse class="uc" cx="560" cy="760" rx="170" ry="40" />
  <text class="txt" text-anchor="middle" x="560" y="766">Danh gia phong</text>

  <!-- Staff use cases -->
  <ellipse class="uc" cx="1000" cy="390" rx="210" ry="40" />
  <text class="txt" text-anchor="middle" x="1000" y="396">Van hanh luu tru (check-in/out, gan phong)</text>

  <ellipse class="uc" cx="1000" cy="520" rx="170" ry="40" />
  <text class="txt" text-anchor="middle" x="1000" y="526">Xu ly doi phong</text>

  <ellipse class="uc" cx="1000" cy="650" rx="190" ry="40" />
  <text class="txt" text-anchor="middle" x="1000" y="656">Xu ly bao cao hu hai</text>

  <!-- Admin use cases -->
  <ellipse class="uc" cx="1420" cy="300" rx="220" ry="40" />
  <text class="txt" text-anchor="middle" x="1420" y="306">Quan ly phong / loai phong / dich vu</text>

  <ellipse class="uc" cx="1420" cy="430" rx="220" ry="40" />
  <text class="txt" text-anchor="middle" x="1420" y="436">Quan ly invoice / payment / refund</text>

  <ellipse class="uc" cx="1420" cy="560" rx="220" ry="40" />
  <text class="txt" text-anchor="middle" x="1420" y="566">Quan ly nguoi dung va phan quyen</text>

  <ellipse class="uc" cx="1420" cy="690" rx="205" ry="40" />
  <text class="txt" text-anchor="middle" x="1420" y="696">Quan tri CMS va cai dat he thong</text>

  <!-- Associations: User (all horizontal, no overlap) -->
  <line class="assoc" x1="130" y1="210" x2="390" y2="210" />
  <line class="assoc" x1="130" y1="320" x2="390" y2="320" />
  <line class="assoc" x1="130" y1="430" x2="390" y2="430" />
  <line class="assoc" x1="130" y1="540" x2="390" y2="540" />
  <line class="assoc" x1="130" y1="650" x2="390" y2="650" />
  <line class="assoc" x1="130" y1="760" x2="390" y2="760" />

  <!-- Associations: Staff (all horizontal, no overlap) -->
  <line class="assoc" x1="130" y1="390" x2="790" y2="390" />
  <line class="assoc" x1="130" y1="520" x2="830" y2="520" />
  <line class="assoc" x1="130" y1="650" x2="810" y2="650" />

  <!-- Associations: Admin (all horizontal, no overlap) -->
  <line class="assoc" x1="130" y1="300" x2="1200" y2="300" />
  <line class="assoc" x1="130" y1="430" x2="1200" y2="430" />
  <line class="assoc" x1="130" y1="560" x2="1200" y2="560" />
  <line class="assoc" x1="130" y1="690" x2="1215" y2="690" />

  <!-- Include / Extend (vertical only, do not cross any association) -->
  <line class="rel" x1="560" y1="430" x2="560" y2="320" marker-end="url(#openArrow)" />
  <text class="txtSmall" x="572" y="382">&lt;&lt;include&gt;&gt;</text>

  <line class="rel" x1="560" y1="650" x2="560" y2="430" marker-end="url(#openArrow)" />
  <text class="txtSmall" x="572" y="545">&lt;&lt;extend&gt;&gt;</text>

  <line class="rel" x1="1000" y1="520" x2="1000" y2="390" marker-end="url(#openArrow)" />
  <text class="txtSmall" x="1012" y="462">&lt;&lt;include&gt;&gt;</text>
</svg>
