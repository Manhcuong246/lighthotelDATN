# --- Docker nhanh (khách sạn / Laravel) ---
# 1) Sao chép:  copy .env.docker.example .env   (ghi đè .env cũ nếu bạn chỉ dùng Docker)
# 2) Chạy:      docker compose up -d --build
# 3) Mở web:    http://127.0.0.1:8080
# PhpMyAdmin (tùy chọn): docker compose --profile tools up -d
# Artisan trên host (MySQL trong Docker): DB_HOST=127.0.0.1 DB_USERNAME=app DB_PASSWORD=app_password php artisan ...
#
# Lỗi 1045 sau khi đổi DB_PASSWORD trong .env: user MySQL `app` đã tạo lần đầu không tự đổi mật khẩu.
# Sửa một lần: docker compose exec mysql mysql -uroot -p<MYSQL_ROOT_PASSWORD> -e "ALTER USER 'app'@'%' IDENTIFIED BY 'CUNG_DB_PASSWORD_TRONG_ENV'; FLUSH PRIVILEGES;"
# Sau đó: docker compose up -d --force-recreate app
#
services:
  mysql:
    image: mysql:8.0
    # Không đặt container_name cố định — cho phép chạy song song nhiều bản copy (vd. DATN vs datn2)
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-hotel_booking}
      # NOTE: Official image rejects MYSQL_USER=root; use a dedicated app user for Docker.
      MYSQL_USER: app
      # Ngoặc kép tránh lỗi parse khi mật khẩu có ký tự đặc biệt
      MYSQL_PASSWORD: "${DB_PASSWORD:-app_password}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_password}"
      # Cho phép root (và client từ Docker bridge, vd. 172.21.0.1) khi dùng php trên host + MySQL trong container
      MYSQL_ROOT_HOST: "%"
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${DB_PORT_FORWARD:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "/var/www/html/docker/entrypoint-app.sh"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      # Trùng cổng nginx mặc định — tránh asset() / URL sai
      APP_URL: ${APP_URL:-http://127.0.0.1:8080}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-hotel_booking}
      DB_USERNAME: app
      DB_PASSWORD: "${DB_PASSWORD:-app_password}"
      LARAVEL_DB_PASSWORD: "${DB_PASSWORD:-app_password}"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      # Dev: OPcache luôn soi lại file — tránh cảm giác "sửa Blade/PHP mà không đổi"
      - ./docker/php/zz-opcache-dev.ini:/usr/local/etc/php/conf.d/zz-opcache-dev.ini:ro
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  phpmyadmin:
    profiles: [tools]
    image: phpmyadmin:5-apache
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: "0"
      UPLOAD_LIMIT: 64M
    ports:
      - "${PMA_PORT:-8081}:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
