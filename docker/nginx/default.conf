server {
    listen 80;
    server_name _;
    charset utf-8;
    root /var/www/html/public;

    # Mặc định nginx 1m → 413 khi gửi form có ảnh (hoàn tiền, minh chứng CK…).
    # 64m đồng bộ với docker-compose/phpmyadmin UPLOAD_LIMIT và ảnh chụp từ điện thoại chưa nén.
    client_max_body_size 64M;

    index index.php index.html;

    # Phục vụ file upload trực tiếp (ổn định khi public/storage trên Windows là symlink "gãy" trong container).
    location ^~ /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_pass app:9000;
    }

    location ~* ^(?!/storage/).*\.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|ttf|otf|woff|woff2)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
